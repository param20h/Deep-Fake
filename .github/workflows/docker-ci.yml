name: Backend Docker CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/docker-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/docker-ci.yml'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # CRITICAL: We need permission to write to GitHub's package registry
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      # Authenticate so we can push the image to your repository
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker image
      run: |
        cd backend
        
        # Docker image names MUST be lowercase, so we convert your repo name automatically
        REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        IMAGE_NAME="ghcr.io/$REPO_LC/deepfake-api"
        
        echo "Building $IMAGE_NAME..."
        
        # We tag it with 'latest' and with the exact commit SHA for version control
        docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} .
        
        # Only push to the public registry if this was a direct push to main (not a Pull Request check)
        if [ "${{ github.event_name }}" = "push" ]; then
          echo "Pushing to GitHub Packages..."
          docker push $IMAGE_NAME --all-tags
        fi
