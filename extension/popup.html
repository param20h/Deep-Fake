<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      width: 300px;
      padding: 16px;
      margin: 0;
      background: #111;
      color: #eee;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      color: #fff;
    }
    p {
      font-size: 13px;
      color: #aaa;
      line-height: 1.4;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      background: #333;
      margin-top: 10px;
    }
    label {
      display: block;
      margin-top: 14px;
      font-size: 12px;
      color: #bbb;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1b1b1b;
      color: #f5f5f5;
      font-size: 12px;
    }
    button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #ef4444;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #8f8f8f;
    }
  </style>
</head>
<body>
  <h2>DeepFake Detector</h2>
  <p>Right-click any image on a webpage and select "Check if Deepfake" to analyze it.</p>
  <div class="badge">Status: Ready</div>
  <label for="apiUrl">Backend API URL</label>
  <input id="apiUrl" type="text" placeholder="http://localhost:8000" />
  <button id="saveBtn">Save URL</button>
  <div class="hint" id="saveStatus"></div>
  <script src="popup.js"></script>
</body>
</html>
